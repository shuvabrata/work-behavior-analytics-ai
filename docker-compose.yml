version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: wba-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wba-ai-app
    restart: unless-stopped
    environment:
      # PostgreSQL connection settings for entrypoint script
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Override DATABASE_URL to use 'postgres' service name instead of 'localhost'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_URL: ${OPENAI_API_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      CUSTOM_API_TOKEN: ${CUSTOM_API_TOKEN}
      CUSTOM_API_URL: ${CUSTOM_API_URL}
      CUSTOM_MODEL: ${CUSTOM_MODEL}
      MAX_TOKENS: ${MAX_TOKENS}
      LOG_FORMAT: ${LOG_FORMAT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: /app/logs
      ENABLE_FILE_LOGGING: "1"
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED}
      NEO4J_MODE: ${NEO4J_MODE}
    ports:
      - "8000:8000"
    volumes:
      # Mount .env file (read-only)
      - ./.env:/app/.env:ro
      # Mount logs directory
      - ./logs:/app/logs
    networks:
      - wba-ai-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  wba-ai-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
