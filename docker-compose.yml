version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: wba-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wba-ai-app
    restart: unless-stopped
    environment:
      # PostgreSQL connection settings for entrypoint script
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Override DATABASE_URL to use 'postgres' service name instead of 'localhost'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      # Backward compatibility aliases (app uses LLM_MODEL)
      OPENAI_MODEL: ${OPENAI_MODEL}
      CUSTOM_MODEL: ${CUSTOM_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_URL: ${OPENAI_API_URL}
      CUSTOM_API_TOKEN: ${CUSTOM_API_TOKEN}
      CUSTOM_API_URL: ${CUSTOM_API_URL}
      MAX_TOKENS: ${MAX_TOKENS}
      LOG_FORMAT: ${LOG_FORMAT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: /app/logs
      ENABLE_FILE_LOGGING: "1"
      # Override NEO4J_URI to use 'neo4j' service name instead of 'localhost'
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED}
      NEO4J_MODE: ${NEO4J_MODE}
    ports:
      - "8000:8000"
    volumes:
      # Mount .env file (read-only)
      - ./.env:/app/.env:ro
      # Mount logs directory
      - ./logs:/app/logs
    networks:
      - wba-ai-network
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started

  neo4j:
    image: neo4j:5.26-community
    container_name: wba-ai-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - wba-ai-network

  jira-sync:
    image: enterprise-graph-jira-sync:latest
    container_name: enterprise-graph-jira-sync
    command: python modules/jira/main.py
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      PYTHONPATH: /app
      LOG_DIR: /var/log/enterprise-graph
    volumes:
      - ./logs:/var/log/enterprise-graph
    depends_on:
      - neo4j
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

  github-sync:
    image: enterprise-graph-github-sync:latest
    container_name: enterprise-graph-github-sync
    command: python modules/github/main.py
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      PYTHONPATH: /app
      LOG_DIR: /var/log/enterprise-graph
    volumes:
      - ./logs:/var/log/enterprise-graph
    depends_on:
      - neo4j
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

networks:
  wba-ai-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
